name: Tests

on:
  push:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash

jobs:
  tests:
    name: Integration and Unit tests
    runs-on:
      group: ${{ matrix.runner.group }}
    strategy:
      fail-fast: true
      matrix:
        runner:
          - os: ubuntu-latest
            group: organization/Default
    #          - os: macos-13
    #            group: organization/macos-gh
    steps:
      - name: Checkout project
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Checkout actions
        uses: actions/checkout@v5
        with:
          repository: pubnub/client-engineering-deployment-tools
          ref: v1
          token: ${{ secrets.GH_TOKEN }}
          path: .github/.release/actions
      - name: Identify target test runner OS
        run: echo "test_runner_os=$(echo "${{ matrix.runner.os }}" | cut -d"-" -f1)" >> $GITHUB_ENV
      - name: Build and run tests
        uses: ./.github/workflows/composite/unit-integration-test-runner
        with:
          os: ${{ env.test_runner_os }}
          version: 1.6.0
          pubNubPubKey: ${{ secrets.PUBNUB_PUBKEY }}
          pubNubSubKey: ${{ secrets.PUBNUB_KEYSUB }}
      - name: Cancel workflow runs for commit on error
        if: ${{ failure() }}
        uses: ./.github/.release/actions/actions/utils/fast-jobs-failure
  dns-discovery-tests:
    name: Windows DNS discovery tests
    runs-on:
      group: windows-gh
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout project
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Checkout actions
        uses: actions/checkout@v5
        with:
          repository: pubnub/client-engineering-deployment-tools
          ref: v1
          token: ${{ secrets.GH_TOKEN }}
          path: .github/.release/actions
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build DNS discovery test
        shell: cmd
        run: |
          cl /nologo /W3 /Fe:tests\dns_discovery\dns_discovery_test.exe ^
            /DPUBNUB_CALLBACK_API ^
            /DPUBNUB_USE_IPV6=1 ^
            /DPUBNUB_USE_SSL=0 ^
            /DPUBNUB_SET_DNS_SERVERS=1 ^
            /DPUBNUB_CHANGE_DNS_SERVERS=0 ^
            /DPUBNUB_USE_LOGGER=1 ^
            /DPUBNUB_USE_DEFAULT_LOGGER=0 ^
            /DPUBNUB_LOG_MIN_LEVEL=NONE ^
            /DPUBNUB_DYNAMIC_REPLY_BUFFER=1 ^
            /DPUBNUB_RECEIVE_GZIP_RESPONSE=0 ^
            /DPUBNUB_ADVANCED_KEEP_ALIVE=0 ^
            /DPUBNUB_USE_SUBSCRIBE_EVENT_ENGINE=0 ^
            /DPUBNUB_USE_SUBSCRIBE_V2=0 ^
            /DPUBNUB_CRYPTO_API=0 ^
            /DPUBNUB_USE_GZIP_COMPRESSION=0 ^
            /DPUBNUB_USE_GRANT_TOKEN_API=0 ^
            /DPUBNUB_USE_REVOKE_TOKEN_API=0 ^
            /DPUBNUB_USE_ACTIONS_API=0 ^
            /DPUBNUB_USE_OBJECTS_API=0 ^
            /DPUBNUB_USE_AUTO_HEARTBEAT=0 ^
            /DPUBNUB_USE_RETRY_CONFIGURATION=0 ^
            /D_WINSOCKAPI_ ^
            /I. /Icore /Icore\c99 /Iwindows /Ilib /Ilib\base64 ^
            tests\dns_discovery\dns_discovery_test.c ^
            windows\pubnub_dns_system_servers.c ^
            core\pubnub_assert_std.c ^
            ws2_32.lib iphlpapi.lib
      - name: Run DNS discovery tests
        run: |
          cd tests\dns_discovery
          .\run_tests.ps1 -TestExe .\dns_discovery_test.exe
      - name: Cancel workflow runs for commit on error
        if: ${{ failure() }}
        uses: ./.github/.release/actions/actions/utils/fast-jobs-failure
  acceptance-tests:
    name: Acceptance tests
    runs-on:
      group: organization/Default
    steps:
      - name: Setup environment
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libboost-all-dev libssl-dev libgtest-dev nlohmann-json3-dev libasio-dev libtclap-dev g++ cmake
          sudo gem install cucumber
      - name: Checkout project
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Checkout mock-server action
        uses: actions/checkout@v5
        with:
          repository: pubnub/client-engineering-deployment-tools
          ref: v1
          token: ${{ secrets.GH_TOKEN }}
          path: .github/.release/actions
      - name: Run mock server action
        uses: ./.github/.release/actions/actions/mock-server
        with:
          token: ${{ secrets.GH_TOKEN }}
      - name: Pull Cucumber cache
        id: cucumber-cpp
        uses: actions/cache@v4
        with:
          path: |
            cucumber-cpp
          key: ${{ runner.os }}-cucumber-cpp-c79100eb70fbb34f6ea10030cec051c2cc9f7961
          restore-keys: |
            ${{ runner.os }}-cucumber-cpp-
      - name: Checkout Cucumber
        if: steps.cucumber-cpp.outputs.cache-hit != 'true'
        uses: actions/checkout@v5
        with:
          repository: cucumber/cucumber-cpp
          ref: c79100eb70fbb34f6ea10030cec051c2cc9f7961
          path: cucumber-cpp-src
      - name: Build Cucumber
        if: steps.cucumber-cpp.outputs.cache-hit != 'true'
        shell: bash
        run: |
          g++ --version
          cd ./cucumber-cpp-src
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCUKE_TESTS_UNIT=OFF
          cmake --build build --config Debug
          cd "$GITHUB_WORKSPACE"
          mkdir -p cucumber-cpp
          mv cucumber-cpp-src/build cucumber-cpp/build
          mv cucumber-cpp-src/include cucumber-cpp/include
          rm -rf cucumber-cpp-src
      - name: Build acceptance tests
        shell: bash
        run: |
          cd cpp
          make -f posix_openssl.mk openssl/pubnub_sync
          cd "$GITHUB_WORKSPACE"
          g++ -std=c++11 -g -o BoostSteps.o -c features/step_definitions/BoostSteps.cpp -Icucumber-cpp/include -Icucumber-cpp/build/src/ -Iposix -Icore -I. -Icpp -D PUBNUB_CRYPTO_API=1 -D PUBNUB_USE_SSL=0
          g++ -o steps BoostSteps.o cpp/pubnub_sync.a cucumber-cpp/build/src/libcucumber-cpp.a -Lboost -lboost_unit_test_framework -lpthread -lboost_regex -lboost_thread -lboost_program_options -lboost_filesystem -lssl -lcrypto -D PUBNUB_USE_SSL=0
      - name: Run acceptance tests
        shell: bash
        env:
          PAM_PUB_KEY: "pub_key"
          PAM_SUB_KEY: "sub_key"
          PAM_SEC_KEY: "sec_key"
        run: |
          mv sdk-specifications/features/access features
          sudo python3 run_contract_tests.py features/access/grant-token.feature
          sudo python3 run_contract_tests.py features/access/revoke-token.feature
          ls -la results
      - name: Expose acceptance tests reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-reports
          path: ./results/**
          retention-days: 7
      - name: Cancel workflow runs for commit on error
        if: ${{ failure() }}
        uses: ./.github/.release/actions/actions/utils/fast-jobs-failure
  all-tests:
    name: Tests
    needs: [ tests, dns-discovery-tests, acceptance-tests ]
    runs-on:
      group: organization/Default
    steps:
      - name: Tests summary
        run: echo -e "\033[38;2;95;215;0m\033[1mAll test successfully passed"
